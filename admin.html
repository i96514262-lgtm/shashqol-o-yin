<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Boshqaruv Paneli</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0c0f17; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #151a26; padding: 20px; border-radius: 12px; border: 1px solid #ff4444; margin-bottom: 15px; }
        h2, h3 { margin-bottom: 12px; }
        input, button, select { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: none; font-size: 1rem; }
        input, select { background: #1e2538; color: white; }
        button { background: #ff4444; color: white; font-weight: bold; cursor: pointer; }
        .user-row { display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 8px; margin: 4px 0; border-radius: 6px; font-size: 0.9rem; }
        .btn-tax-collect { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); color: black; font-size: 0.9rem; padding: 10px; font-weight: bold; border-radius: 6px; border: none; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">

    <div class="card" id="adminLockBox" style="text-align: center; border-style: dashed;">
        <h2 style="color:#ff4444;">🔒 Admin Tizimiga Kirish</h2>
        <input type="password" id="adminSecretPin" placeholder="4 xonali maxfiy kodni kiriting...">
        <button onclick="adminKirish()">KIRISH</button>
    </div>
    
    <div class="card" id="adminBox" style="display: none;">
        <h2 style="color:#ff4444; text-align: center;">Admin Asosiy Paneli ✅</h2>
        <div style="margin-bottom:15px; font-size:1rem; background: rgba(255,255,255,0.03); padding:12px; border-radius:8px;">
            <div>Admin Banki: <b id="admBank" style="color:#10b981">100,000,000</b> UZS</div>
            <div style="margin-top:5px;">2% Soliq Tushumi: <b id="admTax" style="color:#eab308">0</b> UZS</div>
            <button class="btn-tax-collect" onclick="soliqniBankkaOtkaz()">💰 Soliqni Bankka O'tkazish</button>
        </div>
        
        <h3>Foydalanuvchilar Balansi:</h3>
        <div id="adminUserList" style="max-height:160px; overflow-y:auto; margin-bottom:15px; border:1px solid #333; padding:5px; background:#0e121b;"></div>

        <h3>Balans Boshqarish:</h3>
        <input type="text" id="admTarget" placeholder="Foydalanuvchi ismi...">
        <select id="admAction">
            <option value="add">Pul qo'shish (+ Admin Bankdan)</option>
            <option value="withdraw">Pul yechib olish (- Admin Bankka)</option>
        </select>
        <input type="number" id="admAmount" placeholder="Summa...">
        <button onclick="adminAmal_bajar()">AMALNI BAJARISH</button>

        <h3 style="margin-top:15px;">Jonli o'yinlar tarixi:</h3>
        <div id="adminMatchList" style="font-size:0.85rem; color:#aaa; background:#000; padding:8px; border-radius:6px; max-height:120px; overflow-y:auto;"></div>
    </div>

</div>

<script>
    const socket = io();

    function adminKirish() {
        const pin = document.getElementById('adminSecretPin').value;
        socket.emit('admin_auth', pin);
    }

    socket.on('admin_auth_failed', (msg) => alert(msg));
    socket.on('admin_msg', (msg) => alert(msg));

    socket.on('admin_update', (data) => {
        document.getElementById('adminLockBox').style.display = 'none'; 
        document.getElementById('adminBox').style.display = 'block'; 
        
        document.getElementById('admBank').innerText = data.adminBank.toLocaleString();
        document.getElementById('admTax').innerText = data.adminTaxProfit.toLocaleString();
        
        let uHtml = "";
        data.users.forEach(u => {
            uHtml += `<div class='user-row'><span>${u.username} ${u.isBot?'🤖':''}</span><b>${u.balance.toLocaleString()} UZS</b></div>`;
        });
        document.getElementById('adminUserList').innerHTML = uHtml;

        let mHtml = "";
        data.activeRooms.forEach(r => {
            mHtml += `<div>${r.p1} vs ${r.p2} (${r.amount.toLocaleString()}) -> G'olib: <b>${r.winner}</b></div>`;
        });
        document.getElementById('adminMatchList').innerHTML = mHtml || "Hozircha o'yinlar yo'q.";
    });

    function soliqniBankkaOtkaz() {
        socket.emit('collect_tax_to_bank');
    }

    function adminAmal_bajar() {
        const targetUser = document.getElementById('admTarget').value.trim();
        const action = document.getElementById('admAction').value;
        const amount = parseInt(document.getElementById('admAmount').value);
        if(!targetUser || !amount) return alert("Ma'lumotlarni kiriting!");
        socket.emit('admin_action', { targetUser, action, amount });
    }
</script>
</body>
</html>
