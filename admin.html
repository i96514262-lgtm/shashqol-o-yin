<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { background: #151d2a; color: white; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #2c3e50; padding: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>
    <h3>Foydalanuvchilar va Botlar</h3>
    <table id="table"></table>
    <hr>
    <h3>Balans Boshqarish</h3>
    <input type="text" id="user" placeholder="Ism...">
    <select id="action"><option value="add">Qo'shish</option><option value="withdraw">Yechish</option></select>
    <input type="number" id="amt" placeholder="Summa...">
    <button onclick="manage()">AMALNI BAJARISH</button>

    <script>
        async function load() {
            const res = await fetch('/api/users-list');
            const data = await res.json();
            let html = '<tr><th>Ism</th><th>Balans</th></tr>';
            data.bots.forEach(b => html += `<tr><td>${b.name}</td><td>${b.balance}</td></tr>`);
            data.users.forEach(u => html += `<tr><td>${u.username}</td><td>${u.balance}</td></tr>`);
            document.getElementById('table').innerHTML = html;
        }
        async function manage() {
            const body = {username: document.getElementById('user').value, action: document.getElementById('action').value, amount: document.getElementById('amt').value};
            await fetch('/api/admin/manage-balance', {method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
            load();
        }
        load();
    </script>
</body>
</html>
