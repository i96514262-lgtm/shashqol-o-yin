<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .card { background: #1e293b; padding: 25px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #334155; }
        .bank-container { background: #0ea5e9; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3); }
        .bank-title { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .bank-values { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .bank-btn { width: 100%; background: #eab308; color: #000; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; border-bottom: 1px solid #334155; text-align: left; }
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        input, select { padding: 15px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; font-size: 16px; }
        .action-btn { background: #f43f5e; color: white; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="bank-container">
        <div class="bank-title">🏛️ O'yinning Asosiy Bank Fondi</div>
        <div class="bank-values"><span id="main-bank">100,000,000</span> UZS</div>
        <div style="font-size: 14px; margin-bottom: 5px;">Garovlardan yig'ilgan soliq: <span id="tax-amount" style="font-weight: bold;">0</span> UZS</div>
        <button class="bank-btn" onclick="transferTaxToBank()">💰 Soliqni Bankka O'tkazish</button>
    </div>
    <br>

    <div class="card">
        <h3>💰 Kassa boshqaruvi (Balans tahrirlash)</h3>
        <div class="input-group">
            <input type="text" id="target-user" placeholder="Ism yoki Bot nomi (Masalan: Iz yoki Bot_Alisher)">
            <select id="balance-action">
                <option value="add">Pul qo'shish (+)</option>
                <option value="remove">Pul yechib olish (-)</option>
            </select>
            <input type="number" id="balance-amount" placeholder="Summa miqdori...">
            <button class="action-btn" onclick="executeBalanceChange()">Balansni Yangilash</button>
        </div>
    </div>

    <div class="card">
        <h3>🤖 Ishtirokchilar Balansi</h3>
        <table id="balance-table"></table>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('/api/users-list');
                const data = await res.json();
                
                document.getElementById('main-bank').innerText = data.bank.totalBalance.toLocaleString();
                document.getElementById('tax-amount').innerText = data.bank.accumulatedTax.toLocaleString();

                let tbl = '<tr><th>Ism / Bot</th><th>Balans</th></tr>';
                data.bots.forEach(b => tbl += `<tr><td>🤖 ${b.name}</td><td>${b.balance.toLocaleString()} UZS</td></tr>`);
                data.users.forEach(u => tbl += `<tr><td>👤 ${u.username}</td><td>${u.balance.toLocaleString()} UZS</td></tr>`);
                document.getElementById('balance-table').innerHTML = tbl;
            } catch (e) { console.error("Xatolik"); }
        }

        async function transferTaxToBank() {
            const res = await fetch('/api/admin/clear-tax', { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            updateDashboard();
        }

        async function executeBalanceChange() {
            const name = document.getElementById('target-user').value;
            const action = document.getElementById('balance-action').value;
            const amount = document.getElementById('balance-amount').value;

            if(!name || !amount) return alert("Hamma joyni to'ldiring!");

            const res = await fetch('/api/admin/change-balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, action, amount: parseInt(amount) })
            });
            const data = await res.json();
            if(data.success) {
                alert("Muvaffaqiyatli bajarildi!");
                document.getElementById('target-user').value = '';
                document.getElementById('balance-amount').value = '';
                updateDashboard();
            } else { alert("Xato kiritildi!"); }
        }

        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
