<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .card { background: #1e293b; padding: 25px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #334155; }
        
        /* Soliq qismi */
        .tax-title { font-size: 20px; margin: 0; }
        .tax-amount { color: #eab308; font-weight: bold; }
        .bank-btn { background: #0ea5e9; color: white; padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Jadval qismi */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; border-bottom: 1px solid #334155; text-align: left; font-size: 15px; }
        th { color: #94a3b8; }
        .live-tag { color: #10b981; font-weight: bold; }

        /* Balans boshqarish qismi */
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        input, select { padding: 15px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; font-size: 16px; }
        .action-btn { background: #f43f5e; color: white; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .action-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h2 class="tax-title">To'plangan Kompaniya Solig'i: <span id="tax" class="tax-amount">0</span> UZS</h2>
        <button class="bank-btn" onclick="clearTax()">Soliqni Bankka O'tkazish</button>
    </div>

    <!-- PULLARNI BOSHQARISH TIZIMI -->
    <div class="card">
        <h3>💰 Balans Boshqarish (Kassa)</h3>
        <div class="input-group">
            <input type="text" id="target-user" placeholder="Foydalanuvchi yoki Bot ismi... (Masalan: Iz yoki Bot_Alisher)">
            <select id="balance-action">
                <option value="add">Pul qo'shish (+)</option>
                <option value="remove">Pul yechib olish (-)</option>
            </select>
            <input type="number" id="balance-amount" placeholder="Summa... (Masalan: 500000)">
            <button class="action-btn" onclick="executeBalanceChange()">Amalni Bajarish</button>
        </div>
    </div>

    <div class="card">
        <h3>🤖 Botlar va Odamlar Balansi (<span class="live-tag">Jonli 24/7</span>)</h3>
        <table id="balance-table"></table>
    </div>

    <div class="card">
        <h3>📜 Jonli o'yinlar tarixi:</h3>
        <ul id="history-log" style="list-style: none; padding: 0; line-height: 1.8;"></ul>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('/api/users-list');
                const data = await res.json();

                document.getElementById('tax').innerText = data.bank.accumulatedTax.toLocaleString();

                let tbl = '<tr><th>Ism/Bot</th><th>Balans</th></tr>';
                data.bots.forEach(b => tbl += `<tr><td>🤖 ${b.name}</td><td>${b.balance.toLocaleString()} UZS</td></tr>`);
                data.users.forEach(u => tbl += `<tr><td>👤 ${u.username}</td><td>${u.balance.toLocaleString()} UZS</td></tr>`);
                document.getElementById('balance-table').innerHTML = tbl;

                let hist = '';
                data.history.forEach(h => hist += `<li>🕒 ${new Date(h.time).toLocaleTimeString()} -> <b>${h.match}</b> | Garov: ${h.amount.toLocaleString()} | G'olib: <span style="color:#10b981">${h.winner}</span></li>`);
                document.getElementById('history-log').innerHTML = hist;
            } catch (e) { console.error("Yangilashda xatolik"); }
        }

        async function executeBalanceChange() {
            const name = document.getElementById('target-user').value;
            const action = document.getElementById('balance-action').value;
            const amount = document.getElementById('balance-amount').value;

            if(!name || !amount) return alert("Hamma maydonlarni to'ldiring!");

            const res = await fetch('/api/admin/change-balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, action, amount: parseInt(amount) })
            });
            const data = await res.json();
            
            if(data.success) {
                alert("Muvaffaqiyatli bajarildi!");
                document.getElementById('target-user').value = '';
                document.getElementById('balance-amount').value = '';
                updateDashboard();
            } else {
                alert(data.message);
            }
        }

        async function clearTax() {
            await fetch('/api/admin/clear-tax', { method: 'POST' });
            alert("Soliqlar muvaffaqiyatli nolga tushirildi!");
            updateDashboard();
        }

        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
