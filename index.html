<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Suyak O'yini</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #1a1a2e; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        .id-box { color: #00d2ff; font-weight: bold; }
        .online-players { color: #ffd700; font-weight: bold; }
        .balance-box { color: #ffeb3b; font-weight: bold; }
        .tax-bar { background: #2e7d32; color: white; text-align: center; padding: 12px; border-radius: 8px; margin: 20px 0; font-weight: bold; }
        .bet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .bet-btn { padding: 18px; border: none; border-radius: 10px; background: #1e88e5; color: white; cursor: pointer; font-weight: bold; }
        .bet-btn-long { grid-column: span 2; background: #1565c0; }
        #timer { text-align: center; font-size: 3em; color: #ff4757; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="id-box">ID: 887766</div>
        <div class="online-players">👥 1,245</div>
        <div class="balance-box">💲 300,000</div>
    </div>
    <div class="tax-bar">KAMPANIYA SOLIGʻI: 2%</div>
    <div id="timer">20</div>
    <div class="bet-grid">
        <button class="bet-btn" onclick="placeBet(50000)">50 000</button>
        <button class="bet-btn" onclick="placeBet(100000)">100 000</button>
        <button class="bet-btn" onclick="placeBet(300000)">300 000</button>
        <button class="bet-btn" onclick="placeBet(700000)">700 000</button>
        <button class="bet-btn bet-btn-long" onclick="placeBet(1000000)">1 000 000</button>
    </div>

    <script>
        const socket = io();
        socket.on('timer', (time) => { document.getElementById('timer').innerText = time; });
        function placeBet(amount) { socket.emit('placeBet', amount); }
        socket.on('gameResult', (msg) => { alert(msg); });
    </script>
</body>
</html>
