<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shashqol</title>
    <style>
        body { background: #121212; color: #fff; font-family: Arial; text-align: center; }
        .card { background: #1e1e2f; padding: 20px; border-radius: 15px; width: 90%; max-width: 300px; margin: 20px auto; }
        button { background: #4CAF50; border: none; padding: 15px; color: white; width: 100%; border-radius: 8px; margin-top: 10px; font-weight: bold; }
        input { padding: 10px; border-radius: 5px; border: none; width: 80%; }
    </style>
</head>
<body>
    <div id="auth" class="card">
        <input id="name" placeholder="Ismingizni yozing"><br>
        <button onclick="login()">KIRISH</button>
    </div>
    <div id="game" class="card" style="display:none">
        <h1 id="timer">20</h1>
        <h2 id="bal">Balans: 0</h2>
        <button onclick="bet(50000)">50 000 TIKISH</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function login() {
            socket.emit('login', document.getElementById('name').value);
        }
        socket.on('auth', (u) => {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('bal').innerText = "Balans: " + u.balance;
        });
        function bet(amt) { socket.emit('bet', amt); }
        socket.on('update', (b) => document.getElementById('bal').innerText = "Balans: " + b);
        socket.on('timer', (t) => document.getElementById('timer').innerText = t);
    </script>
</body>
</html>
