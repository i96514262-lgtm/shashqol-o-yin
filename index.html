<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshiqlar O'yini VIP</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #070e1b; color: white; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #121e33; padding: 20px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        h2, h3 { color: #17b978; margin-bottom: 12px; text-align: center; }
        input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-size: 1rem; }
        input { background: #1b2a47; color: white; text-align: center; }
        button { background: linear-gradient(135deg, #17b978 0%, #0d8052 100%); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .stats-grid { display: flex; justify-content: space-between; font-size: 0.9rem; color: #cbd5e1; background: rgba(0,0,0,0.15); padding: 10px; border-radius: 8px; }
        .tax-notice { text-align: center; color: #ffca28; font-size: 0.85rem; margin: 10px 0; font-weight: bold; }
        
        .bet-buttons-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn-bet-choice { background: #1e3154; border: 1px solid #2e4775; padding: 15px; font-size: 1rem; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .btn-bet-choice:hover { background: #273f6b; border-color: #17b978; }
        .btn-bet-choice.selected { background: #17b978; color: white; border-color: #fff; box-shadow: 0 0 10px rgba(23,185,120,0.5); }
    </style>
</head>
<body>
<div class="container">

    <div class="card" id="authBox">
        <h2>Oshiqlar O'yini</h2>
        <p style="font-size: 0.85rem; color: #94a3b8; text-align:center; margin-bottom:10px;">Ism va 4 xonali PIN kiriting</p>
        <input type="text" id="username" placeholder="Ismingiz...">
        <input type="password" id="pin" placeholder="4 xonali PIN-kod..." maxlength="4" pattern="\d*">
        <button onclick="tizimgaKirish()">KIRISH (300,000 UZS Bonus)</button>
    </div>

    <div class="card" id="gameBox" style="display:none;">
        <div class="stats-grid">
            <div>Oyinchi: <b id="lblUser" style="color:#ffca28">...</b></div>
            <div>Balans: <b id="lblBalance" style="color:#10b981">0 UZS</b></div>
        </div>
        
        <div class="stats-grid" style="margin-top:8px; background:transparent; padding:5px 0;">
            <div>Onlayn o'yinchilar: <span id="onlineCount" style="color:#10b981; font-weight:bold;">0</span> ta</div>
            <div>Kutilmoqda: <span id="pendingCount" style="color:#ffca28; font-weight:bold;">0</span> ta garov</div>
        </div>
        <div class="tax-notice">💰 2% Kompaniya Solig'i mavjud</div>

        <h3 style="font-size:1.1rem; margin-top:5px;">Garov summasini tanlang:</h3>
        
        <div class="bet-buttons-container">
            <button class="btn-bet-choice" onclick="selectBetAmount(40000, this)">40,000</button>
            <button class="btn-bet-choice" onclick="selectBetAmount(100000, this)">100,000</button>
            <button class="btn-bet-choice" onclick="selectBetAmount(300000, this)">300,000</button>
            <button class="btn-bet-choice" onclick="selectBetAmount(700000, this)">700,000</button>
            <button class="btn-bet-choice" style="grid-column: span 2;" onclick="selectBetAmount(1000000, this)">1,000,000</button>
        </div>

        <button id="btnBet" onclick="garovTikish()" style="background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%);">GAROV TIKISH</button>
        
        <div id="statusText" style="text-align:center; margin-top:15px; font-weight:bold; color:#ffca28; min-height:40px;"></div>
    </div>

</div>

<script>
    const socket = io();
    let myName = "";
    let chosenAmount = 40000; 

    function tizimgaKirish() {
        const username = document.getElementById('username').value.trim();
        const pin = document.getElementById('pin').value.trim();
        if(!username || pin.length < 4) return alert("Ism va 4 xonali PIN yozing!");
        socket.emit('auth', { username, pin });
    }

    socket.on('auth_success', (data) => {
        myName = data.username;
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('gameBox').style.display = 'block';
        document.getElementById('lblUser').innerText = data.username;
        document.getElementById('lblBalance').innerText = data.balance.toLocaleString() + " so'm";
        document.getElementById('statusText').innerText = data.msg;
    });

    socket.on('auth_error', (msg) => alert(msg));
    
    socket.on('error_msg', (msg) => {
        document.getElementById('statusText').innerText = msg;
        document.getElementById('btnBet').disabled = false;
    });

    socket.on('balance_update', (newBalance) => {
        document.getElementById('lblBalance').innerText = newBalance.toLocaleString() + " so'm";
    });

    function selectBetAmount(amount, element) {
        chosenAmount = amount;
        const buttons = document.querySelectorAll('.btn-bet-choice');
        buttons.forEach(btn => btn.classList.remove('selected'));
        element.classList.add('selected');
    }

    function garovTikish() {
        document.getElementById('btnBet').disabled = true;
        socket.emit('place_bet', chosenAmount);
    }

    socket.on('waiting_match', (msg) => {
        document.getElementById('statusText').innerText = msg;
    });

    socket.on('match_result', (data) => {
        document.getElementById('btnBet').disabled = false;
        document.getElementById('lblBalance').innerText = data.balance.toLocaleString() + " so'm";
        if(data.win) {
            document.getElementById('statusText').innerHTML = `<span style='color:#10b981'>Siz yutdingiz! 🎉 +${data.prize.toLocaleString()} so'm</span><br><small>Siz: ${data.roll} | Raqib: ${data.oppRoll}</small>`;
        } else {
            document.getElementById('statusText').innerHTML = `<span style='color:#ef4444'>Siz yutqazdingiz! ❌</span><br><small>Siz: ${data.roll} | Raqib: ${data.oppRoll}</small>`;
        }
    });

    socket.on('global_stats', (data) => {
        document.getElementById('onlineCount').innerText = data.onlineCount;
        document.getElementById('pendingCount').innerText = data.pendingCount;
    });
</script>
</body>
</html>
