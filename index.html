<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshiqlar O'yini</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #111c24; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { padding: 15px 30px; margin: 10px; background: #1a2f3d; border: 2px solid #254053; color: white; font-size: 18px; cursor: pointer; border-radius: 8px;}
        .active { background: #2ecc71; border-color: #2ecc71; }
        .main-btn { background: #e74c3c; width: 80%; padding: 15px; font-size: 20px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

    <h2>Oyinchi: <span id="user-name">Iz</span> | Balans: <span id="user-balance">5,000,000</span> so'm</h2>
    <p>Onlayn o'yinchilar: 5 ta | Kutilmoqda: 0 ta garov</p>

    <h3>Garov summasini tanlang:</h3>
    <button class="btn" onclick="selectBet(40000, this)">40,000</button>
    <button class="btn" onclick="selectBet(100000, this)">100,000</button><br>
    <button class="btn" onclick="selectBet(300000, this)">300,000</button>
    <button class="btn active" onclick="selectBet(700000, this)">700,000</button><br>
    <button class="btn" onclick="selectBet(1000000, this)">1,000,000</button>

    <br><br>
    <button class="main-btn" onclick="playGame()">GAROV TIKISH</button>
    <h3 id="status-text" style="color: #e74c3c;"></h3>

    <script>
        let selectedAmount = 700000;
        let username = "Iz"; 

        function selectBet(amount, element) {
            selectedAmount = amount;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
        }

        async function playGame() {
            document.getElementById('status-text').innerText = "";
            
            const response = await fetch('/api/place-bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, betAmount: selectedAmount })
            });

            const data = await response.json();

            if (!data.success) {
                document.getElementById('status-text').innerText = data.message;
                return;
            }

            // O'yin darhol (0 soniyada) boshlanadi va raqib ismi ko'rinadi
            Swal.fire({
                title: `Raqib topildi: ${data.opponent}`,
                html: `Sizning ochkongiz: <b>${data.userScore}</b><br>Raqib ochkosi: <b>${data.botScore}</b><br><br><h3>${data.result}</h3>`,
                icon: 'info'
            });

            document.getElementById('user-balance').innerText = data.userBalance.toLocaleString();
        }
    </script>
</body>
</html>
