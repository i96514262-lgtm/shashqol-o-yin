<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Oshiqlar O'yini</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #111c24; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .header { background: #1a2f3d; padding: 20px; border-radius: 10px; }
        .btn { padding: 15px; margin: 10px; width: 40%; background: #1a2f3d; color: white; border: 1px solid #254053; border-radius: 8px; cursor: pointer; }
        .active { background: #2ecc71; border: 1px solid #2ecc71; }
        .main-btn { background: #e74c3c; width: 90%; padding: 20px; font-size: 20px; border: none; color: white; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2>O'yinchi: Iz</h2>
        <h3>Balans: <span id="user-balance">5,000,000</span> so'm</h3>
        <p style="color: #f1c40f;">💰 2% Kompaniya Solig'i mavjud</p>
    </div>

    <h3>Garov summasini tanlang:</h3>
    <button class="btn" onclick="selectBet(40000, this)">40,000</button>
    <button class="btn" onclick="selectBet(100000, this)">100,000</button><br>
    <button class="btn" onclick="selectBet(300000, this)">300,000</button>
    <button class="btn active" onclick="selectBet(700000, this)">700,000</button><br>
    <button class="btn" onclick="selectBet(1000000, this)">1,000,000</button>

    <br><br>
    <button class="main-btn" onclick="playGame()">GAROV TIKISH</button>
    
    <script>
        let selectedAmount = 700000;
        function selectBet(amt, el) { 
            selectedAmount = amt; 
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        async function playGame() {
            const res = await fetch('/api/place-bet', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: "Iz", betAmount: selectedAmount})
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('user-balance').innerText = data.userBalance.toLocaleString();
                Swal.fire(data.opponent, data.result);
            } else { alert(data.message); }
        }
    </script>
</body>
</html>
