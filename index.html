<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSHQ OʻYIN</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b1329; color: white; text-align: center; padding: 15px; margin: 0; }
        .box { background: #1c2541; padding: 25px; border-radius: 16px; max-width: 420px; margin: 40px auto; box-shadow: 0 4px 25px rgba(0,0,0,0.5); border: 1px solid #3a506b; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 1rem; }
        input, select { background: #3a506b; color: white; font-weight: bold; }
        button { background: #4cc9f0; color: #0b1329; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        button:disabled { background: #5c677d; cursor: not-allowed; color: #ffffff; }
        .hidden { display: none; }
        .status-text { color: #4cc9f0; font-weight: bold; font-size: 1.1rem; margin: 15px 0; white-space: pre-line; }
        .online-badge { color: #f77f00; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        .tax-badge { background: #d62828; color: white; padding: 5px 12px; border-radius: 20px; display: inline-block; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<!-- 1. Kirish ekrani -->
<div class="box" id="login-screen">
    <h2>🎯 OSHQ OʻYIN</h2>
    <p>Oʻyinga kirish uchun ismingizni yozing:</p>
    <input type="text" id="player-name" placeholder="Ismingiz...">
    <button onclick="login()">Oʻyinga kirish</button>
</div>

<!-- 2. Asosiy o'yin ekrani -->
<div class="box hidden" id="game-screen">
    <div class="online-badge">Onlayn oʻyinchilar: <span id="online-users">0</span> ta</div>
    <div class="tax-badge">Kompaniya xizmati: 3%</div>
    
    <h2>OSHQ OʻYIN</h2>
    <h3 id="hello-text">Salom</h3>
    <p>Sizning balansingiz: <span id="user-bal" style="color:#4ade80; font-weight:bold;">0</span> soʻm</p>
    <hr style="border-color: #3a506b;">
    
    <div id="setup-area">
        <p>Tikish miqdorini tanlang:</p>
        <select id="bet-amount">
            <option value="10000">10 000 soʻm</option>
            <option value="50000" selected>50 000 soʻm</option>
            <option value="100000">100 000 soʻm</option>
            <option value="500000">500 000 soʻm</option>
        </select>
        <button id="find-btn" style="background: #22c55e; color:white;" onclick="findOpponent()">Raqib qidirish</button>
    </div>

    <div id="play-area" class="hidden">
        <div class="status-text" id="status-msg">Raqib qidirilmoqda...</div>
        <button id="roll-btn" onclick="roll()" disabled>Oshiqlarni tashlash 🎲</button>
    </div>

    <button id="buy-btn" style="background:#e11d48; color:white; display:none;" onclick="buyChips()">Pul sotib olish (500k)</button>
</div>

<script>
    const socket = io();
    let currentRoom = "";

    function login() {
        const name = document.getElementById('player-name').value;
        socket.emit('register_player', name);
    }

    socket.on('register_success', (data) => {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('hello-text').innerText = data.name;
        document.getElementById('user-bal').innerText = data.balance.toLocaleString();
    });

    socket.on('online_count', (count) => {
        document.getElementById('online-users').innerText = count;
    });

    function findOpponent() {
        const bet = document.getElementById('bet-amount').value;
        socket.emit('find_opponent', bet);
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('play-area').classList.remove('hidden');
    }

    socket.on('waiting_mode', (msg) => {
        document.getElementById('status-msg').innerText = msg;
    });

    socket.on('game_start', (data) => {
        currentRoom = data.roomId;
        document.getElementById('status-msg').innerText = `Raqib topildi: ${data.p1} VS ${data.p2}!\nTikildi: ${data.bet.toLocaleString()} soʻm.\n\nOshiqlarni tashlang!`;
        document.getElementById('roll-btn').disabled = false;
    });

    function roll() {
        socket.emit('roll_dice', currentRoom);
        document.getElementById('roll-btn').disabled = true;
        document.getElementById('status-msg').innerText = "Oshiqlarni tashladingiz. Raqib kutilmoqda...";
    }

    socket.on('player_rolled', (data) => {
        document.getElementById('status-msg').innerText = `${data.name} oshiqlarni tashladi!`;
    });

    socket.on('game_over', (data) => {
        alert(data.result);
        
        let myNewBalance = socket.id === data.p1Id ? data.p1Balance : data.p2Balance;
        document.getElementById('user-bal').innerText = myNewBalance.toLocaleString();

        document.getElementById('setup-area').classList.remove('hidden');
        document.getElementById('play-area').classList.add('hidden');
        document.getElementById('roll-btn').disabled = true;

        if (myNewBalance < 10000) {
            document.getElementById('buy-btn').style.display = "block";
            document.getElementById('find-btn').disabled = true;
        }
    });

    function buyChips() {
        socket.emit('buy_chips');
        document.getElementById('buy-btn').style.display = "none";
        document.getElementById('find-btn').disabled = false;
    }

    socket.on('balance_updated', (newBal) => {
        document.getElementById('user-bal').innerText = newBal.toLocaleString();
    });

    socket.on('error_msg', msg => {
        alert(msg);
        document.getElementById('setup-area').classList.remove('hidden');
        document.getElementById('play-area').classList.add('hidden');
    });
</script>
</body>
</html>
