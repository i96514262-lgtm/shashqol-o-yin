<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSHQ OʻYIN — Shashqol</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid #334155; text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 20px; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 14px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 12px; background: #0ea5e9; border: none; color: #fff; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #0284c7; }
        .profile-card { background: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; text-align: left; }
        .profile-card p { margin-bottom: 8px; font-size: 16px; }
        .profile-card span { font-weight: bold; color: #38bdf8; }
        .status-box { background: #334155; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; font-size: 16px; color: #e2e8f0; }
        .lobby-box { display: flex; gap: 10px; margin-top: 15px; }
        .screen { display: none; }
        .active { display: block; }
        .error { color: #ef4444; font-size: 14px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 OSHQ OʻYIN</h1>

    <div id="loading-screen" class="screen active">
        <p style="color: #94a3b8; font-size: 16px;">Tizim tekshirilmoqda, iltimos kuting...</p>
    </div>

    <div id="auth-screen" class="screen">
        <p style="color: #94a3b8; margin-bottom: 15px; font-size: 14px;">Tizimda akkauntingiz topilmadi. Yangi profil yarating:</p>
        <div class="input-group">
            <label>Ismingiz:</label>
            <input type="text" id="name-input" placeholder="Ismingizni kiriting...">
        </div>
        <div class="input-group">
            <label>4 xonali maxfiy parol (Akkauntni himoyalash uchun):</label>
            <input type="number" id="password-input" placeholder="Masalan: 1234" oninput="if(this.value.length>4) this.value=this.value.slice(0,4);">
        </div>
        <button onclick="handleRegister()">Akkaunt yaratish va Kirish</button>
    </div>

    <div id="main-game-screen" class="screen">
        <div class="profile-card">
            <p>Foydalanuvchi: <span id="display-name">...</span></p>
            <p>ID raqamingiz: <span id="display-id">...</span></p>
            <p>Balansingiz: <span id="display-balance" style="color: #22c55e;">0 so'm</span></p>
        </div>

        <div class="input-group" id="bet-area">
            <label>Oʻyin tikish summasi (soʻm):</label>
            <input type="number" id="bet-input" value="1000" placeholder="Tikish summasini yozing...">
            <button onclick="startSearch()">Raqib qidirish</button>
        </div>

        <div id="game-status" class="status-box" style="display: none;">Raqib qidirilmoqda...</div>
        
        <button id="roll-btn" style="display: none; background: #22c55e;" onclick="rollDice()">Toshlarni tashlash! 🎲</button>
    </div>
</div>

<script>
    const socket = io();
    let currentRoomId = null;

    // Sayt yuklanishi bilan xotirani tekshirish va login qilish
    window.addEventListener('DOMContentLoaded', () => {
        const savedId = localStorage.getItem('shashqol_user_id');
        const savedPassword = localStorage.getItem('shashqol_user_password');

        if (savedId && savedPassword) {
            // Agar telefonda eski ma'lumot bo'lsa, avtomat kirgizamiz
            socket.emit('register_player', {
                id: savedId,
                password: savedPassword
            });
        } else {
            // Agar toza bo'lsa, registratsiya oynasini ochamiz
            switchScreen('auth-screen');
        }
    });

    // Yangi ro'yxatdan o'tish tugmasi bosilganda
    function handleRegister() {
        const name = document.getElementById('name-input').value.trim();
        const password = document.getElementById('password-input').value.trim();

        if (!name) return alert('Iltimos, ismingizni kiriting!');
        if (password.length !== 4) return alert('Parol aniq 4 ta raqam boʻlishi shart!');

        // Parolni muvaffaqiyatli javob kelganda saqlash uchun vaqtincha saqlaymiz
        window.temp_password = password;

        socket.emit('register_player', {
            name: name,
            password: password
        });
    }

    // Serverdan muvaffaqiyatli kirish javobi kelganda
    socket.on('register_success', (playerData) => {
        // Ma'lumotlarni telefon xotirasiga qulflaymiz
        localStorage.setItem('shashqol_user_id', playerData.id);
        if (window.temp_password) {
            localStorage.setItem('shashqol_user_password', window.temp_password);
            delete window.temp_password;
        }

        // Ekrandagi ma'lumotlarni yangilash
        document.getElementById('display-name').textContent = playerData.name;
        document.getElementById('display-id').textContent = playerData.id;
        document.getElementById('display-balance').textContent = playerData.balance.toLocaleString() + " so'm";

        switchScreen('main-game-screen');
    });

    // Balans yangilanganda (yutuq yoki yutqiziqdan keyin)
    socket.on('balance_updated', (newBalance) => {
        document.getElementById('display-balance').textContent = newBalance.toLocaleString() + " so'm";
    });

    // Raqib qidirishni boshlash
    function startSearch() {
        const bet = document.getElementById('bet-input').value;
        if (!bet || bet <= 0) return alert('Tikish summasini toʻgʻri kiriting!');
        
        document.getElementById('bet-area').style.display = 'none';
        const statusBox = document.getElementById('game-status');
        statusBox.style.display = 'block';
        statusBox.textContent = "Raqib qidirilmoqda, kuting...";
        
        socket.emit('find_opponent', bet);
    }

    // Kutish rejimi xabari
    socket.on('waiting_mode', (msg) => {
        document.getElementById('game-status').textContent = msg;
    });

    // O'yin boshlanganda
    socket.on('game_start', (data) => {
        currentRoomId = data.roomId;
        const statusBox = document.getElementById('game-status');
        statusBox.innerHTML = `Oʻyin boshlandi!<br><span style="color:#38bdf8">${data.p1}</span> VS <span style="color:#ef4444">${data.p2}</span><br>Tikilgan pul: ${data.bet.toLocaleString()} so'm`;
        
        document.getElementById('roll-btn').style.display = 'block';
    });

    // Tosh tashlash tugmasi bosilganda
    function rollDice() {
        if (!currentRoomId) return;
        socket.emit('roll_dice', currentRoomId);
        document.getElementById('roll-btn').style.display = 'none';
        document.getElementById('game-status').textContent = "Siz tosh tashladingiz. Raqibingiz harakatini kuting...";
    }

    // Raqib tosh tashlaganda
    socket.on('player_rolled', (data) => {
        document.getElementById('game-status').innerHTML += `<br>✅ ${data.name} tosh tashladi!`;
    });

    // O'yin butunlay tugaganda va natija chiqqanda
    socket.on('game_over', (data) => {
        currentRoomId = null;
        document.getElementById('roll-btn').style.display = 'none';
        
        const statusBox = document.getElementById('game-status');
        statusBox.innerHTML = `🏆 OʻYIN TUGADI!<br><br><span style="color:#22c55e; font-size:18px;">Natija: ${data.result}</span>`;
        
        // 7 soniyadan keyin eski holatga qaytarish va tikish oynasini ochish
        setTimeout(() => {
            statusBox.style.display = 'none';
            document.getElementById('bet-area').style.display = 'block';
        }, 7000);
    });

    // Xatoliklar yuz berganda
    socket.on('error_msg', (msg) => {
        alert(msg);
        document.getElementById('bet-area').style.display = 'block';
        document.getElementById('game-status').style.display = 'none';
        document.getElementById('roll-btn').style.display = 'none';

        // Agar parolda chalkashlik bo'lsa xotirani tozalab qayta yuklaydi
        if (msg.includes("Xato ID")) {
            localStorage.clear();
            location.reload();
        }
    });

    socket.on('force_cancel_game', () => {
        currentRoomId = null;
        document.getElementById('bet-area').style.display = 'block';
        document.getElementById('game-status').style.display = 'none';
        document.getElementById('roll-btn').style.display = 'none';
    });

    // Ekranlarni almashtirish funksiyasi
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
</script>

</body>
</html>
